name: Send Football Table to Telegram

on:
  schedule:
    # Berjalan otomatis setiap jam 06:00 WIB (23:00 UTC) dan 18:00 WIB (11:00 UTC)
    - cron: '0 23,11 * * *'
  workflow_dispatch: # Memunculkan tombol "Run workflow" di GitHub agar bisa tes manual

jobs:
  send-updates:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-node: '20'

    - name: Install Dependencies
      run: npm install axios

    - name: Execute Bot Script
          env:
            TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          run: node bot.js
